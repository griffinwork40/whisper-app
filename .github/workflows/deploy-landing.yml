# deploy-landing.yml
#
# Deploys the landing/ directory to GitHub Pages on every push to main
# that touches landing/** or assets/**.
#
# ONE-TIME REPO SETUP (do this once before the first deployment):
#   1. GitHub repo → Settings → Pages
#      - Source: "GitHub Actions"  (NOT "Deploy from a branch")
#   2. GitHub repo → Settings → Environments
#      - Verify the "github-pages" environment was auto-created by the workflow run.
#      - If not, create it manually (Name: github-pages).
#
# After the first successful run, your page is live at:
#   https://<username>.github.io/<repo>/
# or the custom domain if configured in Settings → Pages.
#
# Asset path note:
#   The workflow copies assets/ into landing/ before uploading so that
#   ./assets/icon-*.png references in index.html resolve correctly.
#   The uploaded artifact root IS the landing/ directory, so the final
#   URLs are https://<pages-url>/assets/icon-*.png.

name: Deploy Landing Page

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'assets/**'
      - '.github/workflows/deploy-landing.yml'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Grant the minimum permissions needed for Pages deployment
permissions:
  contents: read
  pages:    write
  id-token: write

# Prevent concurrent deployments racing each other
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Copy tray icon assets into landing/ so relative ./assets/ paths work
      - name: Copy assets into landing/
        run: |
          mkdir -p landing/assets
          cp -r assets/. landing/assets/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload landing/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
