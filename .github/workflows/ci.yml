name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    # macOS-only app: mlx-whisper is Apple Silicon, uiohook-napi is mac-native.
    # macos-14 runners are arm64; sufficient to compile + run unit tests
    # (the tests do not invoke ffmpeg or python at runtime).
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
